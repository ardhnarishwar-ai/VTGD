<!DOCTYPE html>
<html>

<head>
    <title>VTGD Cockpit</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="cockpit">

    <div class="header">
        <h1>🚗 VTGD</h1>
        <span>COCKPIT</span>
    </div>

    <div class="card hero-card">

    <div class="hero-left">
        <h2>TREND vs DIFFUSION</h2>
        <div class="status">OPPOSITE</div>
        <p>Price moving against diffusion destination</p>
    </div>

    <div class="hero-right">
        <h2>PREDICTION MODE</h2>
        <p>Opportunity building...</p>
    </div>

</div>

    <div class="card">
        Safety Score
    </div>

    <div class="card">
        Strike
    </div>

    <div class="card">
        Vega
    </div>

    <div class="card">
        Gamma
    </div>

    <div class="card">
        Delta
    </div>

    <div class="card">
        Theta
    </div>

    <div class="card">
        Zero → Hero
    </div>

    </div>

    <script src="app.js"></script>

</body>

</html>
