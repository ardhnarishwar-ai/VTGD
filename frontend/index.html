<!DOCTYPE html>
<html>

<head>
    <title>VTGD Cockpit</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="cockpit">

    <div class="header">
        <h1>🚗 VTGD</h1>
        <span>COCKPIT</span>
    </div>

    <div class="card hero-card">

    <div class="hero-left">
        <h2>TREND vs DIFFUSION</h2>
        <div class="status">OPPOSITE</div>
        <p>Price moving against diffusion destination</p>
    </div>

    <div class="hero-right">
        <h2>PREDICTION MODE</h2>
        <p>Opportunity building...</p>
    </div>

</div>

    <div class="card">

    <h2>🛡️ SAFETY SCORE</h2>

    <div class="progress">

        <div class="fill"></div>

    </div>

    <h1>82%</h1>

    <p>GOOD</p>

    </div>

    <div class="card nw-card">

    <div class="nw-header">
        <span>🧭 NATURAL WEIGHT</span>
    </div>

    <div class="nw-value">
        +6.82
    </div>

    <div class="nw-status">
        BULLISH
    </div>

    <div class="nw-footer">
        Gravity Increasing
    </div>

    </div>

    <div class="card">
        Vega
    </div>

    <div class="card">
        Gamma
    </div>

    <div class="card">
        Delta
    </div>

    <div class="card">
        Theta
    </div>

    <div class="card">
        Zero → Hero
    </div>

    </div>

    <script src="app.js"></script>

</body>

</html>
