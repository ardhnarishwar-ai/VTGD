<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>VTGD Cockpit v2</title>

    <link rel="stylesheet" href="../frontend/style.css">
</head>

<body>

<div class="cockpit">

    <div class="header">
    <div class="logo">🚗</div>

    <div class="title">
        <h1>VTGD</h1>
        <span>COCKPIT</span>
    </div>

    <div class="menu">☰</div>
    </div>

<div class="card trend-card">

    <h2>🚦 Trend vs Diffusion</h2>

    <div class="trend-row">
        <span>Trend</span>
        <strong>↑ Bullish</strong>
    </div>

    <div class="trend-row">
        <span>Diffusion</span>
        <strong>↓ Bearish</strong>
    </div>

    <div class="prediction danger">

        <h3>🔴 OPPOSITE</h3>

        <p>Prediction Mode Active</p>

        <strong>ZERO → HERO</strong>

    </div>

</div>

    <div class="card gravity-card">

    <h2>🌍 Net Weight (NW)</h2>

    <div class="gravity-meter">

        <div class="needle"></div>

    </div>

    <div class="gravity-value">

        <span>NW</span>

        <strong>+0.37</strong>

    </div>

    <div class="gravity-status positive">

        BUYER DOMINANT

    </div>

    </div>
   ...
</div>
    <div class="card strike-card">

    <h2>🎯 VTGD Strike Scanner</h2>

    <div class="expiry">
        CURRENT EXPIRY
    </div>

    <div class="top-strike">

        <div class="strike-name">

            ⭐ 25100 CE

        </div>

        <div class="strike-score">

            Safety 96%

        </div>

        <div class="strike-state green">

            ZERO → HERO

        </div>

    </div>

    <div class="other-strikes">

        <div class="row">

            <span>25050 PE</span>

            <strong>91%</strong>

        </div>

        <div class="row">

            <span>24950 CE</span>

            <strong>82%</strong>

        </div>

    </div>

    </div>

    

</div>

<script src="../frontend/app.js"></script>

</body>
</html>
